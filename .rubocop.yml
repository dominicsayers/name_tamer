---
plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  DisplayCopNames: true
  DisplayStyleGuide: true
  Exclude:
    - bin/**/*
    - tmp/**/*
    - vendor/**/*

Layout/DotPosition:
  EnforcedStyle: leading
  Enabled: true

Layout/ExtraSpacing:
  Enabled: true

Layout/LineLength:
  Max: 120
  Enabled: true

Metrics/BlockLength:
  CountComments: false  # count full line comments?
  CountAsOne:
    - array
    - hash
  Exclude:
    - '**/*_spec.rb'

Metrics/CyclomaticComplexity:
  Max: 8

Metrics/MethodLength:
  Max: 23
  Enabled: true

Metrics/ModuleLength:
  CountComments: false  # count full line comments?
  CountAsOne:
    - array
    - hash

Naming/FileName:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/MutableConstant:
  Enabled: true

Style/StringLiterals:
  EnforcedStyle: single_quotes
  Enabled: true

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma
