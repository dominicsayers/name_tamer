name: Test
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          ruby-version: '4.0.6'
          bundler-cache: true
      - run: bundle exec rubocop --format github

  rspec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.ruby == '3.4'
        with:
          name: coverage
          path: coverage/

  sonar:
    runs-on: ubuntu-latest
    needs: rspec
    if: github.event_name == 'push' || !github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          ruby-version: '4.0.6'
          bundler-cache: true
      - run: bundle exec rspec
      # Until SonarQube supports SimpleCov 1.0, we need to adapt the report to be compatible with SonarQube.
      # A fix has been proposed in https://github.com/SonarSource/sonar-ruby/pull/160
      - name: Adapt SimpleCov report for SonarQube
        run: |
          jq --arg root "$PWD" \
            'del(."$schema") | .coverage |= with_entries(.key = ($root + "/" + .key))' \
            coverage/coverage.json > coverage/coverage.tmp
          mv coverage/coverage.tmp coverage/coverage.json
      - run: bundle exec rubocop --format json --out rubocop.json || true
      - uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
